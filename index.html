<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Biblioteca Gamer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/luva.png">
</head>
<body>

  <div class="container">

    
    <img src="assets/cena.png" alt="Cena Computador" class="background">

    
    <div class="center-box">
      <h1>
        <span class="cursor">></span>
        Digite o nome do jogo
      </h1>

      <input 
        type="text" 
        id="gameInput" 
        placeholder="Ex: Streets of Rage"
      >

      <p id="mensagem"></p>
    </div>

  </div>

  
  <script src="script.js"></script>

</body>
</html>
